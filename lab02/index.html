<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 02 - HTML Basics</title>
</head>

<body>

    <!-- Main Heading -->
    <h1>Lab 02 - HTML Basics</h1>

    <!-- Sub Heading -->
    <h2>Welcome to Lab 02</h2>

    <!-- Paragraph -->
    <p>This is my second lab of Web Technologies.</p>

    <!-- Text Formatting -->
    <p><strong>This text is bold.</strong></p>
    <p><em>This text is italic.</em></p>
    <p><mark>This text is highlighted.</mark></p>
    <p><small>This text is small.</small></p>

    <!-- Horizontal Line -->
    <hr>

    <!-- Line Break Example -->
    <p>
        This is first line.<br>
        This is second line.
    </p>

</body>

</html>
