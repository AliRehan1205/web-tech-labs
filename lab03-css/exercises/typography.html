<!DOCTYPE html>
<html>
<head>
<title>Typography Example</title>

<style>

body{
 font-family: Arial, sans-serif;
 background-color:#f4f4f4;
 padding:20px;
}

h1{
 text-align:center;
 font-size:40px;
 color:darkblue;
}

p{
 font-size:18px;
 line-height:1.6;
 color:#333;
}

.bold{
 font-weight:bold;
}

.italic{
 font-style:italic;
}

.uppercase{
 text-transform:uppercase;
}

.center{
 text-align:center;
}

</style>

</head>

<body>

<h1>Typography Styling</h1>

<p>This paragraph demonstrates basic typography styling using CSS.</p>

<p class="bold">This paragraph is bold.</p>

<p class="italic">This paragraph is italic.</p>

<p class="uppercase">this text is transformed to uppercase.</p>

<p class="center">This paragraph is centered.</p>

</body>
</html>
