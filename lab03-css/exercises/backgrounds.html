<!DOCTYPE html>
<html>
<head>
<title>Background Styling</title>

<style>

body{
 background-color:#e6f2ff;
 font-family:Arial;
 text-align:center;
 padding:40px;
}

.section1{
 background-color:lightblue;
 padding:20px;
 margin:20px;
}

.section2{
 background-image:url("https://picsum.photos/800/200");
 background-size:cover;
 color:white;
 padding:40px;
 margin:20px;
}

.section3{
 background: linear-gradient(to right, purple, pink);
 color:white;
 padding:40px;
 margin:20px;
}

</style>

</head>

<body>

<h1>Background Styling</h1>

<div class="section1">
<p>This section uses a simple background color.</p>
</div>

<div class="section2">
<p>This section uses a background image.</p>
</div>

<div class="section3">
<p>This section uses a gradient background.</p>
</div>

</body>
</html>
