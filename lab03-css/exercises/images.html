<!DOCTYPE html>
<html>
<head>
<title>Image Styling</title>

<style>

body{
 font-family:Arial;
 text-align:center;
 background:#f4f4f4;
 padding:30px;
}

img{
 width:250px;
 border-radius:10px;
 border:3px solid #333;
 margin:20px;
}

img:hover{
 transform:scale(1.1);
 transition:0.3s;
}

</style>

</head>

<body>

<h1>Image Styling</h1>

<img src="https://picsum.photos/250" alt="random image">

<img src="https://picsum.photos/251" alt="random image">

<img src="https://picsum.photos/252" alt="random image">

</body>
</html>
