<!DOCTYPE html>
<html>
<head>
<title>Float Layout</title>

<style>

.container{
width:90%;
margin:auto;
}

.column{
width:30%;
float:left;
margin:1%;
background:#ddd;
padding:20px;
}

.clearfix::after{
content:"";
display:block;
clear:both;
}

</style>

</head>

<body>

<h1>Three Column Float Layout</h1>

<div class="container clearfix">

<div class="column">
<h3>Column 1</h3>
<p>This column uses float left.</p>
</div>

<div class="column">
<h3>Column 2</h3>
<p>This column uses float left.</p>
</div>

<div class="column">
<h3>Column 3</h3>
<p>This column uses float left.</p>
</div>

</div>

</body>
</html>
