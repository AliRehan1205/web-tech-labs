<!DOCTYPE html>
<html>
<head>
<title>Positioning Example</title>

<style>

.container{
position:relative;
height:300px;
background:#f4f4f4;
}

.box{
width:100px;
height:100px;
color:white;
text-align:center;
line-height:100px;
}

.static{background:gray;}

.relative{
background:blue;
position:relative;
top:20px;
left:20px;
}

.absolute{
background:red;
position:absolute;
top:50px;
right:50px;
}

.fixed{
background:green;
position:fixed;
bottom:10px;
right:10px;
}

</style>

</head>

<body>

<h1>CSS Positioning</h1>

<div class="container">

<div class="box static">Static</div>

<div class="box relative">Relative</div>

<div class="box absolute">Absolute</div>

</div>

<div class="box fixed">Fixed</div>

</body>
</html>
