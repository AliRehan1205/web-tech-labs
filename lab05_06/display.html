<!DOCTYPE html>
<html>
<head>
<title>Display Properties</title>
<link rel="stylesheet" href="styles/style.css">

<style>

.block{
display:block;
background:lightblue;
margin:10px;
padding:10px;
}

.inline{
display:inline;
background:orange;
padding:10px;
}

.inline-block{
display:inline-block;
background:lightgreen;
padding:10px;
width:120px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<h1>Display Property Demonstration</h1>

<div class="block">Block Element</div>
<div class="block">Another Block Element</div>

<span class="inline">Inline</span>
<span class="inline">Inline</span>

<br><br>

<div class="inline-block">Inline Block</div>
<div class="inline-block">Inline Block</div>

<p class="hidden">You cannot see this element because display is none.</p>

</body>
</html>
